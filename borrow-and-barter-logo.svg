<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
<title id="title">Borrow &amp; Barter Back-to-Back B Logo</title>
<desc id="desc">A symmetrical black and charcoal double-B monogram with a central banner reading Borrow and Barter.</desc>

<defs>
  <linearGradient id="blackMetal" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#25252a"/>
    <stop offset=".45" stop-color="#08080b"/>
    <stop offset="1" stop-color="#1b1b20"/>
  </linearGradient>
  <linearGradient id="charcoal" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#77777d"/>
    <stop offset=".5" stop-color="#333338"/>
    <stop offset="1" stop-color="#111115"/>
  </linearGradient>
  <linearGradient id="bannerFill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#3d3d43"/>
    <stop offset="1" stop-color="#17171b"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity=".55"/>
  </filter>
</defs>

<!-- Transparent background -->

<g filter="url(#shadow)">
  <!-- Left reversed B -->
  <path d="M575 165
           L395 165
           C275 165 210 215 210 300
           C210 350 240 386 290 405
           C230 427 195 472 195 530
           C195 625 275 675 405 675
           L575 675
           L575 585
           L435 585
           C365 585 330 565 330 525
           C330 486 366 465 435 465
           L545 465
           L545 375
           L445 375
           C380 375 345 355 345 320
           C345 278 380 255 445 255
           L575 255 Z"
        fill="url(#blackMetal)" stroke="#050507" stroke-width="10" stroke-linejoin="round"/>

  <!-- Left inner highlights -->
  <path d="M430 255 C350 255 305 280 305 323 C305 364 345 388 420 388"
        fill="none" stroke="#5c5c63" stroke-width="13" opacity=".7"/>
  <path d="M420 465 C335 465 290 490 290 530 C290 578 335 600 425 600"
        fill="none" stroke="#4b4b52" stroke-width="13" opacity=".65"/>

  <!-- Right B -->
  <path d="M625 165
           L805 165
           C925 165 990 215 990 300
           C990 350 960 386 910 405
           C970 427 1005 472 1005 530
           C1005 625 925 675 795 675
           L625 675
           L625 585
           L765 585
           C835 585 870 565 870 525
           C870 486 834 465 765 465
           L655 465
           L655 375
           L755 375
           C820 375 855 355 855 320
           C855 278 820 255 755 255
           L625 255 Z"
        fill="url(#blackMetal)" stroke="#050507" stroke-width="10" stroke-linejoin="round"/>

  <!-- Right inner highlights -->
  <path d="M770 255 C850 255 895 280 895 323 C895 364 855 388 780 388"
        fill="none" stroke="#5c5c63" stroke-width="13" opacity=".7"/>
  <path d="M780 465 C865 465 910 490 910 530 C910 578 865 600 775 600"
        fill="none" stroke="#4b4b52" stroke-width="13" opacity=".65"/>

  <!-- Center spine -->
  <path d="M600 160 L635 190 L620 650 L600 690 L580 650 L565 190 Z"
        fill="url(#charcoal)" stroke="#08080a" stroke-width="9"/>

  <!-- Banner tails -->
  <path d="M255 350 L105 375 L160 425 L100 485 L280 455 Z"
        fill="#17171b" stroke="#050507" stroke-width="10"/>
  <path d="M945 350 L1095 375 L1040 425 L1100 485 L920 455 Z"
        fill="#17171b" stroke="#050507" stroke-width="10"/>

  <!-- Main banner -->
  <path d="M170 345
           Q600 275 1030 345
           L1010 485
           Q600 420 190 485 Z"
        fill="url(#bannerFill)" stroke="#08080a" stroke-width="14"/>

  <!-- Banner inner border -->
  <path d="M200 365
           Q600 305 1000 365
           L988 458
           Q600 400 212 458 Z"
        fill="none" stroke="#e7e7ea" stroke-width="7"/>

  <!-- Text -->
  <text x="600" y="414"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="#ffffff"
        stroke="#0a0a0c"
        stroke-width="3"
        paint-order="stroke"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="76"
        font-weight="700"
        letter-spacing="-2">BORROW &amp; BARTER</text>
</g>
</svg>