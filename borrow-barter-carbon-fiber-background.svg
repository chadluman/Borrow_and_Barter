<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-label="Black carbon fiber website background with gold and silver accents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="45%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="42%" stop-color="#444444" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.62"/>
    </radialGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6e4600"/>
      <stop offset="20%" stop-color="#d39b26"/>
      <stop offset="42%" stop-color="#fff0a3"/>
      <stop offset="65%" stop-color="#c88a10"/>
      <stop offset="100%" stop-color="#4e3100"/>
    </linearGradient>

    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="18%" stop-color="#e9e9e9"/>
      <stop offset="45%" stop-color="#8b8b8b"/>
      <stop offset="72%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#1f1f1f"/>
    </linearGradient>

    <linearGradient id="darkMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090909"/>
      <stop offset="50%" stop-color="#262626"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>

    <pattern id="carbon" width="36" height="36" patternUnits="userSpaceOnUse" patternTransform="rotate(24)">
      <rect width="36" height="36" fill="#070707"/>
      <rect x="0" y="0" width="18" height="18" fill="#191919"/>
      <rect x="18" y="18" width="18" height="18" fill="#171717"/>
      <path d="M0 18h36M18 0v36" stroke="#000" stroke-opacity="0.45" stroke-width="2"/>
      <path d="M2 2h14v14H2zM20 20h14v14H20z" fill="#2b2b2b" fill-opacity="0.28"/>
      <path d="M20 2h14v14H20zM2 20h14v14H2z" fill="#000" fill-opacity="0.38"/>
    </pattern>

    <pattern id="mesh" width="24" height="20" patternUnits="userSpaceOnUse">
      <path d="M6 0l6 3.5v7L6 14l-6-3.5v-7z" transform="translate(2 2)" fill="none" stroke="#8f8f8f" stroke-opacity="0.20" stroke-width="1"/>
      <path d="M6 0l6 3.5v7L6 14l-6-3.5v-7z" transform="translate(14 12)" fill="none" stroke="#d7b45c" stroke-opacity="0.13" stroke-width="1"/>
    </pattern>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#000" flood-opacity="0.65"/>
    </filter>

    <filter id="glowGold" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 0.65 0 0 0.62  0 0 0.2 0 0.05  0 0 0 0.8 0" result="goldGlow"/>
      <feMerge><feMergeNode in="goldGlow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1536" height="1024" fill="url(#bg)"/>
  <rect width="1536" height="1024" fill="url(#carbon)" opacity="0.92"/>
  <rect width="1536" height="1024" fill="url(#centerGlow)"/>

  <!-- subtle angled center plate -->
  <path d="M130 180 L1260 58 L1452 244 L1362 780 L282 940 L82 754 Z" fill="#050505" opacity="0.42"/>
  <path d="M176 204 L1227 93 L1415 264 L1324 744 L310 888 L124 735 Z" fill="url(#carbon)" opacity="0.38"/>

  <!-- corner mesh accents -->
  <g opacity="0.58">
    <path d="M0 0H330L210 124H0Z" fill="url(#mesh)"/>
    <path d="M1536 0H1210L1332 124H1536Z" fill="url(#mesh)"/>
    <path d="M0 1024H350L228 880H0Z" fill="url(#mesh)"/>
    <path d="M1536 1024H1190L1310 880H1536Z" fill="url(#mesh)"/>
  </g>

  <!-- top-left metallic frame -->
  <g filter="url(#softShadow)">
    <path d="M0 128 L372 0 H520 L318 104 L268 166 L0 285 Z" fill="url(#darkMetal)"/>
    <path d="M0 168 L356 22 H470 L304 107 L254 166 L0 258 Z" fill="#030303" opacity="0.88"/>
    <path d="M0 210 L260 115 L315 50 L378 25 L278 139 L0 244 Z" fill="url(#silver)" opacity="0.88"/>
    <path d="M0 248 L268 153 L326 88 L502 0 H540 L332 107 L286 169 L0 287 Z" fill="url(#gold)" filter="url(#glowGold)" opacity="0.95"/>
    <path d="M0 263 L282 170 L334 110 L540 0" fill="none" stroke="#111" stroke-width="13" opacity="0.75"/>
  </g>

  <!-- top-right metallic frame -->
  <g filter="url(#softShadow)">
    <path d="M1536 116 L1162 0 H1010 L1217 111 L1260 168 L1536 296 Z" fill="url(#darkMetal)"/>
    <path d="M1536 164 L1188 21 H1062 L1233 111 L1274 170 L1536 258 Z" fill="#040404" opacity="0.9"/>
    <path d="M1536 203 L1270 112 L1218 50 L1158 25 L1255 137 L1536 241 Z" fill="url(#silver)" opacity="0.88"/>
    <path d="M1536 247 L1262 154 L1205 88 L1027 0 H988 L1202 108 L1248 170 L1536 288 Z" fill="url(#gold)" filter="url(#glowGold)" opacity="0.95"/>
    <path d="M1536 263 L1249 172 L1198 111 L988 0" fill="none" stroke="#111" stroke-width="13" opacity="0.75"/>
  </g>

  <!-- bottom-left metallic frame -->
  <g filter="url(#softShadow)">
    <path d="M0 812 L376 1024 H526 L318 915 L268 854 L0 731 Z" fill="url(#darkMetal)"/>
    <path d="M0 858 L356 1002 H470 L304 916 L254 858 L0 766 Z" fill="#030303" opacity="0.9"/>
    <path d="M0 816 L260 909 L315 974 L378 999 L278 886 L0 781 Z" fill="url(#silver)" opacity="0.82"/>
    <path d="M0 776 L268 871 L326 936 L502 1024 H540 L332 917 L286 856 L0 737 Z" fill="url(#gold)" filter="url(#glowGold)" opacity="0.95"/>
    <path d="M0 760 L282 854 L334 914 L540 1024" fill="none" stroke="#111" stroke-width="13" opacity="0.75"/>
  </g>

  <!-- bottom-right metallic frame -->
  <g filter="url(#softShadow)">
    <path d="M1536 812 L1160 1024 H1010 L1218 915 L1268 854 L1536 731 Z" fill="url(#darkMetal)"/>
    <path d="M1536 858 L1180 1002 H1062 L1234 916 L1284 858 L1536 766 Z" fill="#030303" opacity="0.9"/>
    <path d="M1536 816 L1274 909 L1220 974 L1158 999 L1258 886 L1536 781 Z" fill="url(#silver)" opacity="0.82"/>
    <path d="M1536 776 L1268 871 L1210 936 L1034 1024 H996 L1204 917 L1250 856 L1536 737 Z" fill="url(#gold)" filter="url(#glowGold)" opacity="0.95"/>
    <path d="M1536 760 L1252 854 L1202 914 L996 1024" fill="none" stroke="#111" stroke-width="13" opacity="0.75"/>
  </g>

  <!-- inner beveled border accents -->
  <path d="M96 210 L332 112 L382 49" fill="none" stroke="#d8d8d8" stroke-width="3" opacity="0.72"/>
  <path d="M1440 210 L1204 112 L1154 49" fill="none" stroke="#d8d8d8" stroke-width="3" opacity="0.72"/>
  <path d="M96 814 L332 912 L382 975" fill="none" stroke="#d8d8d8" stroke-width="3" opacity="0.55"/>
  <path d="M1440 814 L1204 912 L1154 975" fill="none" stroke="#d8d8d8" stroke-width="3" opacity="0.55"/>

  <!-- faint gold pinstripes -->
  <path d="M0 54 L310 0" stroke="#d4a02d" stroke-width="2" opacity="0.75"/>
  <path d="M1536 54 L1226 0" stroke="#d4a02d" stroke-width="2" opacity="0.75"/>
  <path d="M0 970 L310 1024" stroke="#d4a02d" stroke-width="2" opacity="0.55"/>
  <path d="M1536 970 L1226 1024" stroke="#d4a02d" stroke-width="2" opacity="0.55"/>
</svg>
